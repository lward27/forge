apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.forgePlatform.name }}
  labels:
    {{- include "forge-platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.forgePlatform.name }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.forgePlatform.name }}
  namespace: {{ .Release.Namespace }}
