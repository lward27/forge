apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.forgePostgresql.name }}
  labels:
    app.kubernetes.io/name: {{ .Values.forgePostgresql.name }}
spec:
  serviceName: {{ .Values.forgePostgresql.name }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.forgePostgresql.name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.forgePostgresql.name }}
    spec:
      containers:
      - name: postgresql
        image: "{{ .Values.forgePostgresql.image.repository }}:{{ .Values.forgePostgresql.image.tag }}"
        imagePullPolicy: {{ .Values.forgePostgresql.image.pullPolicy }}
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.forgePostgresql.auth.existingSecret }}
              key: {{ .Values.forgePostgresql.auth.passwordKey }}
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: {{ .Values.forgePostgresql.auth.existingSecret }}
              key: {{ .Values.forgePostgresql.auth.databaseKey }}
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        resources:
          {{- toYaml .Values.forgePostgresql.resources | nindent 10 }}
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 15
          periodSeconds: 30
  volumeClaimTemplates:
  - metadata:
      name: pgdata
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.forgePostgresql.persistence.storageClass }}
      resources:
        requests:
          storage: {{ .Values.forgePostgresql.persistence.size }}
